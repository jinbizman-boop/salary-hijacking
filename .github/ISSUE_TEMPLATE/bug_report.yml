name: 버그 리포트
description: 급여납치 플랫폼의 모바일 앱, API, DB, 관리자, 알림, 광고/제휴, 운영 환경에서 발견된 오류를 표준 형식으로 제보합니다.
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        ## 급여납치 버그 리포트
        결함은 재현 가능성, 사용자 영향, 금액/개인정보 위험, 출시 차단 여부를 기준으로 처리합니다.
        급여, 대출, 저축, 소비 내역, 토큰, 이메일, 전화번호, 푸시 토큰 등 민감정보 원문은 입력하지 말고 반드시 마스킹해 주세요.

  - type: input
    id: summary
    attributes:
      label: 요약
      description: 화면 또는 기능명을 포함해 한 줄로 작성해 주세요.
      placeholder: "예: [급여 홈] 변동지출 삭제 후 오늘 남은금액이 재계산되지 않음"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      description: 사용자 영향과 서비스 위험도를 기준으로 선택해 주세요.
      options:
        - "S0/Blocker - 전체 서비스 중단, 앱 실행 불가, 개인정보 노출 의심, 금액 대량 오류"
        - "S1/Critical - 로그인·급여·예산·지출·저축 등 핵심 기능 불가 또는 금액/권한 오류"
        - "S2/Major - 주요 기능 오류, 우회는 가능하지만 정식 출시 전 수정 필요"
        - "S3/Minor - 일부 화면, 문구, 상태 표시 등 사용은 가능한 품질 저하"
        - "S4/Trivial - 미세 정렬, 내부 표기, 운영 영향이 낮은 문제"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 출시와 운영 대응 기준의 우선순위를 선택해 주세요.
      options:
        - "P0 - 즉시 대응 / 서비스 중단·보안·개인정보·금액 정합성 사고"
        - "P1 - MVP/정식 출시 차단 / 급여관리 핵심 플로우 오류"
        - "P2 - 출시 전 수정 원칙 / 주요 사용 흐름 또는 운영 기능 오류"
        - "P3 - 차기 배포 가능 / 편의·비핵심 UI·문구 개선"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: 초기 상태
      description: 신규 등록, 재오픈, 수정 빌드 재검증, 연기 여부를 선택해 주세요.
      options:
        - "New - 신규 등록"
        - "Reopened - 수정 후 재발 또는 미수정"
        - "Retest - 수정 빌드 재검증 요청"
        - "Deferred - 승인된 연기/백로그 전환"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 영향 영역
      description: 가장 직접적으로 문제가 발생한 영역을 선택해 주세요.
      options:
        - "Auth - 스플래시/로그인/소셜 로그인/토큰/세션"
        - "Payroll - 급여 홈/급여일/수령금액/납치금액/목표 달성률"
        - "Plan - 급여 계획/월별 계획/목표 설정"
        - "FixedExpense - 고정지출/구독/대출/보험/통신비"
        - "Savings - 고정저축/청약/적금/투자/비상금"
        - "DailyBudget - 일일 예산/오늘 사용금액/오늘 남은금액/초과 알림"
        - "VariableExpense - 변동지출 등록/수정/삭제/카테고리"
        - "Notification - 알림/푸시/이벤트/결제 예정/예산 초과"
        - "LevelUp - 독서/뉴스/영어/건강/경험치/레벨"
        - "Community - 게시판/게시글/댓글/좋아요/신고/공유"
        - "Write - 글쓰기/첨부/익명/질문/게시판 선택"
        - "MyPage - 프로필/누적 납치금액/내 활동/문의/공지"
        - "Admin - 관리자 콘솔/운영/공지/CS/모더레이션"
        - "Ads - 광고/제휴 배너/노출/클릭/동의/분리 저장"
        - "API - Cloudflare Workers/Hono API/응답/오류코드/requestId"
        - "DB - Neon PostgreSQL/마이그레이션/트랜잭션/정합성"
        - "Infra - CI/CD/GitHub Actions/배포/환경변수/Cloudflare/R2"
        - "SecurityPrivacy - 보안/권한/개인정보/민감정보/감사로그"
        - "Performance - 성능/응답속도/렌더링/쿼리/배치"
        - "DocsQA - 문서/테스트/체크리스트/릴리즈 품질"
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: 구축 단계 영향
      description: 결함이 어떤 구축 단계의 완료 기준에 영향을 주는지 선택해 주세요.
      options:
        - "1단계 - 기초 인프라/모노레포/환경변수/CI/CD"
        - "2단계 - 인증/서버 권위/급여·예산·지출·저축 데이터 안정성"
        - "3단계 - 급여 홈/계획/일일 예산/고정·변동 지출/알림"
        - "4단계 - LV UP/커뮤니티/글쓰기/마이페이지/자동화 테스트"
        - "5단계 - 관리자/광고·제휴/운영/성능/배포 안정화/상용화"
        - "공통 - 여러 단계에 걸친 결함"
    validations:
      required: true

  - type: dropdown
    id: environment_type
    attributes:
      label: 발생 환경 구분
      description: 결함이 발생한 배포/실행 환경을 선택해 주세요.
      options:
        - "Local"
        - "Development"
        - "Staging"
        - "Production"
        - "Preview/PR Environment"
        - "TestFlight/Internal App Distribution"
        - "알 수 없음"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 상세 발생 환경
      description: 앱/웹/API/DB/인프라 버전과 실행 환경을 가능한 한 정확히 입력해 주세요.
      placeholder: |
        - 앱 버전:
        - 빌드 번호/커밋 SHA:
        - API 버전 또는 배포 ID:
        - OS/브라우저:
        - 기기/해상도:
        - 네트워크 상태:
        - Cloudflare/Neon/R2/GitHub Actions 관련 환경:
    validations:
      required: true

  - type: textarea
    id: user_context
    attributes:
      label: 사용자/권한 조건
      description: 재현에 필요한 사용자 상태와 권한을 작성해 주세요. 실제 개인정보는 마스킹하세요.
      placeholder: |
        - 로그인 상태: 로그인 / 비로그인 / 만료 세션
        - 사용자 유형: 일반 사용자 / 관리자 / 운영자 / QA 계정
        - 권한/역할:
        - 온보딩 완료 여부:
        - 급여 계획 존재 여부:
        - 테스트 계정 또는 익명화된 userId:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 같은 사람이 그대로 따라 했을 때 재현할 수 있도록 번호 순서로 작성해 주세요.
      placeholder: |
        1.
        2.
        3.
        4.
        5.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 문서/화면/API/DB/정책 기준으로 정상 동작해야 하는 결과를 작성해 주세요.
      placeholder: "예: 변동지출 삭제 후 오늘 사용금액이 차감되고, 오늘 남은금액과 현재 납치금액이 서버 계산값 기준으로 즉시 갱신되어야 한다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      description: 실제 관찰된 결과와 오류 문구, 비정상 수치를 작성해 주세요.
      placeholder: "예: 삭제 성공 토스트는 표시되지만 오늘 사용금액이 유지되고 홈 화면 재진입 전까지 남은금액이 갱신되지 않는다."
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 발생 빈도
      description: 결함 재현 빈도를 선택해 주세요.
      options:
        - "항상 재현됨"
        - "자주 재현됨"
        - "가끔 재현됨"
        - "1회만 발생"
        - "특정 조건에서만 발생"
        - "재현 불가하지만 로그/사용자 제보 존재"
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: 회귀 여부
      description: 이전 빌드/버전 대비 새로 발생했는지 선택해 주세요.
      options:
        - "신규 결함"
        - "회귀 결함 - 이전에는 정상 동작"
        - "기존 미발견 결함"
        - "수정 후 재발"
        - "판단 불가"
    validations:
      required: true

  - type: textarea
    id: financial_calculation_context
    attributes:
      label: 금액/계산 정합성 정보
      description: 급여·예산·지출·저축·납치금액·목표 달성률과 관련된 결함이면 필수로 작성해 주세요. 해당 없으면 "해당 없음"으로 작성합니다.
      placeholder: |
        - 해당 여부: 해당 / 해당 없음
        - 입력값: 예) 수령 예정 급여, 고정지출, 고정저축, 일일 예산, 변동지출
        - 기대 계산식: 예) 예상 납치금액 = max(0, 수령 예정 급여 - 예정 지출금액)
        - 기대 계산 결과:
        - 실제 계산 결과:
        - 서버 응답값과 클라이언트 표시값 일치 여부:
        - 관련 테스트 케이스 ID: 예) CALC-001, CALC-VE-004
    validations:
      required: true

  - type: textarea
    id: api_db_context
    attributes:
      label: API/DB/서버 권위 정보
      description: API, DB, 서버 계산, 배치, 트랜잭션 문제이면 작성해 주세요. 민감정보 원문은 제거하세요.
      placeholder: |
        - Endpoint/Method:
        - HTTP Status:
        - errorCode:
        - requestId/traceId:
        - idempotencyKey 사용 여부:
        - 관련 테이블/레코드 ID:
        - 트랜잭션/동시성/중복 요청 의심 여부:
        - 서버 계산값과 DB 저장값 차이:
    validations:
      required: false

  - type: textarea
    id: security_privacy_impact
    attributes:
      label: 보안/개인정보 영향
      description: 급여·대출·저축·소비·토큰·이메일·푸시 토큰·타인 데이터 노출 가능성을 반드시 점검해 주세요.
      placeholder: |
        - 개인정보/민감정보 노출 여부: 예 / 아니오 / 판단 불가
        - 타인 데이터 접근 가능성: 예 / 아니오 / 판단 불가
        - 인증/인가 우회 가능성: 예 / 아니오 / 판단 불가
        - 로그에 민감정보 원문 노출 여부: 예 / 아니오 / 판단 불가
        - 광고/제휴 데이터와 재무 원천 데이터 혼합 가능성: 예 / 아니오 / 판단 불가
        - 필요한 긴급 조치:
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 증빙 자료
      description: 스크린샷, 영상, 로그, requestId, traceId, Sentry/Crashlytics 링크, PR/커밋 링크를 첨부해 주세요. 민감정보는 마스킹하세요.
      placeholder: |
        - 스크린샷:
        - 영상:
        - 로그:
        - requestId/traceId:
        - crash/session 링크:
        - 관련 PR/커밋/배포:
    validations:
      required: false

  - type: textarea
    id: workaround
    attributes:
      label: 임시 우회 방법
      description: 사용자 또는 운영자가 즉시 적용할 수 있는 임시 우회 방법이 있으면 작성해 주세요.
      placeholder: "예: 앱 재실행 후 급여 홈을 새로고침하면 서버 재조회로 정상 수치가 표시된다."
    validations:
      required: false

  - type: textarea
    id: impact_scope
    attributes:
      label: 영향 범위와 출시 차단 여부
      description: 사용자 수, 기능 범위, 운영/CS/배포 영향, 출시 차단 여부를 작성해 주세요.
      placeholder: |
        - 영향 사용자 규모:
        - 영향 기능/화면:
        - 운영/CS 영향:
        - 데이터 보정 필요 여부:
        - 사용자 공지 필요 여부:
        - 출시/배포 차단 여부:
    validations:
      required: true

  - type: textarea
    id: related_specs
    attributes:
      label: 관련 문서/화면/API/테스트 케이스
      description: 확인 가능한 문서, 화면 ID, 기능 ID, API, DB, 테스트 케이스를 연결해 주세요.
      placeholder: |
        - 화면 ID: 예) SCR-003 급여 홈
        - 기능 ID: 예) FUN-006 변동지출 기록, FUN-007 납치금액 계산
        - API: 예) POST /v1/variable-expenses
        - DB: 예) variable_expenses, daily_budgets
        - 테스트 케이스: 예) CALC-VE-001, API-EXP-001
        - 관련 문서:
    validations:
      required: false

  - type: textarea
    id: retest_scope
    attributes:
      label: 수정 후 재검증 범위
      description: 수정 완료 후 QA가 반드시 확인해야 할 원 결함, 회귀 범위, 대표 디바이스를 작성해 주세요.
      placeholder: |
        - 원 결함 재현 절차 재검증:
        - 회귀 테스트 범위 최소 3개:
          1.
          2.
          3.
        - 대표 디바이스/브라우저:
        - API/DB 재검증:
        - 금액 계산 재검증:
    validations:
      required: true

  - type: checkboxes
    id: reporter_checklist
    attributes:
      label: 제보자 체크리스트
      description: 이슈 등록 전 확인한 항목을 체크해 주세요.
      options:
        - label: 기존 이슈를 검색했고 중복 여부를 확인했습니다.
          required: true
        - label: 재현 절차, 기대 결과, 실제 결과를 구분해서 작성했습니다.
          required: true
        - label: 급여·대출·저축·소비 내역, 토큰, 이메일 등 민감정보 원문을 제거하거나 마스킹했습니다.
          required: true
        - label: 금액 계산 결함인 경우 입력값, 기대 계산식, 실제 결과를 작성했습니다.
          required: false
        - label: API/DB 결함인 경우 requestId/traceId 또는 관련 로그를 가능한 범위에서 첨부했습니다.
          required: false
        - label: 출시 차단 또는 보안/개인정보 이슈 가능성이 있으면 심각도를 S0/S1 또는 우선순위 P0/P1로 지정했습니다.
          required: true

  - type: checkboxes
    id: triage_checklist
    attributes:
      label: 담당자/QA 트리아지 체크리스트
      description: 담당자 배정 후 처리자가 확인합니다.
      options:
        - label: 심각도와 우선순위를 재검토했습니다.
          required: false
