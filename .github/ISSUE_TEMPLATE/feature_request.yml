name: 기능 요청
description: 급여납치 플랫폼의 신규 기능, 기능 개선, 운영 기능, 관리자 기능, 자동화, 광고/제휴, QA 개선 요청을 표준 형식으로 등록합니다.
title: "[FEATURE] "
labels:
  - feature
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        ## 급여납치 기능 요청
        이 템플릿은 급여납치 플랫폼의 신규 기능과 개선 기능을 제품·개발·QA·운영 기준으로 검토하기 위한 표준 양식입니다.

        기능 요청은 단순 아이디어가 아니라, 급여납치의 서비스 목표인 급여 선점 관리, 서버 권위 계산, 일일 예산 통제, 자기계발 루틴, 커뮤니티, 광고/제휴, 관리자 운영, 상용화 안정성 기준과 연결되어야 합니다.

        급여, 대출, 저축, 소비 내역, 토큰, 이메일, 전화번호, 푸시 토큰 등 민감정보 원문은 작성하지 말고 반드시 마스킹해 주세요.

  - type: input
    id: feature_name
    attributes:
      label: 기능명
      description: 요청하는 기능명을 명확하게 작성해 주세요.
      placeholder: "예: 변동지출 삭제 후 서버 권위 기준으로 일일 예산 자동 재계산"
    validations:
      required: true

  - type: textarea
    id: feature_summary
    attributes:
      label: 기능 요약
      description: 기능의 목적과 핵심 동작을 2~5문장으로 요약해 주세요.
      placeholder: "예: 사용자가 변동지출을 삭제하면 서버에서 오늘 사용금액, 오늘 남은금액, 현재 납치금액을 재계산하고 홈 화면과 계획 화면에 동일한 결과를 반영한다."
    validations:
      required: true

  - type: dropdown
    id: feature_type
    attributes:
      label: 기능 유형
      description: 요청의 성격을 선택해 주세요.
      options:
        - "신규 기능"
        - "기존 기능 개선"
        - "사용자 경험 개선"
        - "서버 권위 계산 개선"
        - "API/DB 기능 개선"
        - "관리자/운영 기능"
        - "알림/스케줄러 기능"
        - "광고/제휴 기능"
        - "보안/개인정보 개선"
        - "QA/E2E/테스트 자동화 개선"
        - "성능/안정성 개선"
        - "문서/가이드와 연결된 기능 보강"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 출시와 사용자 영향 기준으로 선택해 주세요.
      options:
        - "P0 - 즉시 반영 / 출시·보안·금액 정합성·운영 차단"
        - "P1 - 이번 단계 완료 전 필수 반영"
        - "P2 - 정식 출시 전 반영 원칙"
        - "P3 - 차기 개선 또는 실험 기능"
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: 관련 구축 단계
      description: 이 기능이 어떤 구축 단계의 완료 기준과 연결되는지 선택해 주세요.
      options:
        - "1단계 - 기초 인프라/모노레포/경로/환경변수/CI/CD"
        - "2단계 - 인증/서버 권위/급여·예산·지출·저축 데이터 안정성"
        - "3단계 - 급여 홈/계획/일일 예산/고정·변동 지출/알림"
        - "4단계 - LV UP/커뮤니티/글쓰기/마이페이지/자동화 테스트"
        - "5단계 - 관리자/광고·제휴/운영/성능/배포 안정화/상용화"
        - "공통 - 여러 단계에 걸친 기능"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: 기능 영향 영역
      description: 가장 직접적으로 영향을 받는 영역을 선택해 주세요.
      options:
        - "Auth - 스플래시/로그인/소셜 로그인/토큰/세션"
        - "Payroll - 급여 홈/급여일/수령금액/납치금액/목표 달성률"
        - "Plan - 급여 계획/월별 계획/목표 설정"
        - "FixedExpense - 고정지출/구독/대출/보험/통신비"
        - "Savings - 고정저축/청약/적금/투자/비상금"
        - "DailyBudget - 일일 예산/오늘 사용금액/오늘 남은금액/초과 알림"
        - "VariableExpense - 변동지출 등록/수정/삭제/카테고리"
        - "Notification - 알림/푸시/결제 예정/예산 초과/성과 알림"
        - "LevelUp - 독서/뉴스/영어/건강/경험치/레벨"
        - "Community - 게시판/게시글/댓글/좋아요/신고/공유"
        - "Write - 글쓰기/첨부/익명/질문/게시판 선택"
        - "MyPage - 프로필/누적 납치금액/내 활동/문의/공지"
        - "Admin - 관리자 콘솔/운영/공지/CS/모더레이션"
        - "AdsPartner - 광고/제휴 배너/노출/클릭/전환/동의"
        - "API - Cloudflare Workers/Hono API/응답/오류코드"
        - "DB - Neon PostgreSQL/스키마/마이그레이션/트랜잭션"
        - "InfraDeploy - Cloudflare/R2/GitHub Actions/환경변수/배포"
        - "SecurityPrivacy - 보안/개인정보/민감정보/로그/감사로그"
        - "QARelease - 테스트/E2E/UAT/릴리즈/롤백"
    validations:
      required: true

  - type: textarea
    id: target_user
    attributes:
      label: 대상 사용자/권한
      description: 이 기능을 사용할 사용자와 권한 조건을 작성해 주세요.
      placeholder: |
        - 대상 사용자: 일반 사용자 / 관리자 / 운영자 / QA / 비로그인 사용자
        - 사용자 상태: 신규 사용자 / 온보딩 완료 / 급여 계획 등록 완료 / 장기 사용자
        - 필요한 권한:
        - 접근 제한 조건:
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 해결할 문제
      description: 현재 사용자가 겪는 문제, 운영상 불편, 개발/QA 병목, 비즈니스 손실을 구체적으로 작성해 주세요.
      placeholder: "예: 변동지출 수정/삭제 후 서버 재계산 기준이 명확하지 않아 홈, 계획, 알림의 금액 표시가 서로 달라질 수 있다."
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: 사용자 스토리
      description: 누가, 왜, 무엇을 할 수 있어야 하는지 작성해 주세요.
      placeholder: |
        - As a:
        - I want:
        - So that:
        - 대표 시나리오:
          1.
          2.
          3.
    validations:
      required: true

  - type: textarea
    id: business_value
    attributes:
      label: 기대 효과/비즈니스 가치
      description: 이 기능이 급여납치의 제품 목표와 상용화에 어떤 가치를 만드는지 작성해 주세요.
      placeholder: |
        - 사용자 가치:
        - 리텐션/활성화 영향:
        - 수익화/광고·제휴 영향:
        - 운영 효율 영향:
        - 데이터 품질 영향:
        - 출시 완성도 영향:
    validations:
      required: true

  - type: textarea
    id: scope_in
    attributes:
      label: 포함 범위
      description: 이번 기능 요청에 반드시 포함되어야 하는 항목을 작성해 주세요.
      placeholder: |
        - 포함 기능 1:
        - 포함 기능 2:
        - 포함 기능 3:
        - 필수 화면:
        - 필수 API:
        - 필수 DB/데이터:
        - 필수 테스트:
    validations:
      required: true

  - type: textarea
    id: scope_out
    attributes:
      label: 제외 범위
      description: 이번 요청에 포함하지 않을 항목을 명확히 작성해 범위 확산을 방지합니다.
      placeholder: |
        - 제외 기능:
        - 차기 단계로 넘길 기능:
        - 별도 이슈로 분리할 기능:
    validations:
      required: true

  - type: textarea
    id: ux_flow
    attributes:
      label: 화면/UX 흐름
      description: 관련 화면, 사용자 동선, 상태, 예외 케이스를 작성해 주세요.
      placeholder: |
        - 관련 화면 ID: 예) SCR-003 급여 홈, SCR-006 계획/설정
        - 진입 경로:
        - 주요 사용자 행동:
        - 성공 상태:
        - 빈 상태:
        - 로딩 상태:
        - 오류 상태:
        - 권한 없음 상태:
        - 모바일/반응형 고려사항:
    validations:
      required: true

  - type: textarea
    id: functional_requirements
    attributes:
      label: 기능 요구사항
      description: 구현해야 할 동작을 번호로 작성해 주세요.
      placeholder: |
        1.
        2.
        3.
        4.
        5.
    validations:
      required: true

  - type: textarea
    id: api_db_server_authority
    attributes:
      label: API/DB/서버 권위 요구사항
      description: API, DB, 계산 로직, 트랜잭션, 동시성, 정합성 요구사항을 작성해 주세요.
      placeholder: |
        - 서버 권위 계산 필요 여부: 예 / 아니오 / 판단 필요
        - 관련 API:
        - 요청 DTO:
        - 응답 DTO:
        - 관련 DB 테이블:
        - 필요한 인덱스/제약조건:
        - 트랜잭션 필요 여부:
        - 동시성/중복 요청 처리:
        - idempotencyKey 필요 여부:
        - 감사로그 필요 여부:
        - 클라이언트 캐시/동기화 기준:
    validations:
      required: true

  - type: textarea
    id: financial_rules
    attributes:
      label: 금액/계산 규칙
      description: 급여·예산·지출·저축·납치금액·목표 달성률과 관련된 기능이면 필수로 작성해 주세요. 해당 없으면 "해당 없음"으로 작성합니다.
      placeholder: |
        - 해당 여부: 해당 / 해당 없음
        - 금액 단위: KRW, 1원 단위, 소수점 불가
        - 음수 허용 여부:
        - 계산식:
        - 반올림/절삭 기준:
        - 예산 초과 처리:
        - 삭제/수정/취소 시 재계산 기준:
        - 월 경계/급여일 경계 처리:
        - 서버 응답값과 클라이언트 표시값 일치 기준:
    validations:
      required: true

  - type: textarea
    id: security_privacy
    attributes:
      label: 보안/개인정보/민감정보 요구사항
      description: 급여·대출·저축·소비·토큰·이메일·푸시 토큰·권한과 관련된 요구사항을 작성해 주세요.
      placeholder: |
        - 개인정보/민감정보 관련 여부: 예 / 아니오 / 판단 필요
        - 인증 필요 여부:
        - 권한/RBAC 필요 여부:
        - 관리자 접근 제한 필요 여부:
        - 로그 마스킹 필요 여부:
        - 감사로그 필요 여부:
        - 데이터 보존/삭제 정책:
        - 사용자 동의 필요 여부:
        - 보안 리뷰 필요 여부:
    validations:
      required: true

  - type: textarea
    id: ads_partner_ops
    attributes:
      label: 광고/제휴/운영 영향
      description: 광고, 제휴, 이벤트, 관리자 운영, CS, 공지, 모더레이션 영향이 있으면 작성해 주세요. 해당 없으면 "해당 없음"으로 작성합니다.
      placeholder: |
        - 해당 여부: 해당 / 해당 없음
        - 광고/제휴 노출 영향:
        - 광고 데이터와 재무 원천 데이터 분리 필요 여부:
        - 사용자 동의/옵트아웃 필요 여부:
        - 관리자 콘솔 필요 기능:
        - 운영자 액션:
        - CS/공지 필요 여부:
        - 신고/제재/모더레이션 영향:
    validations:
      required: true

  - type: textarea
    id: non_functional_requirements
    attributes:
      label: 비기능 요구사항
      description: 성능, 접근성, 안정성, 관측성, 배포 안정성 요구사항을 작성해 주세요.
      placeholder: |
        - 성능 기준:
        - 접근성 기준:
        - 오류 처리 기준:
        - 로깅/모니터링 기준:
        - 장애 대응/롤백 기준:
        - 오프라인/네트워크 오류 대응:
        - 다국어/한국어 문구 기준:
        - 테스트 커버리지 기준:
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: 의존성/선행 작업
      description: 이 기능을 구현하기 전에 완료되어야 하는 문서, API, DB, 디자인, 인프라, 정책 작업을 작성해 주세요.
      placeholder: |
        - 선행 문서:
        - 선행 디자인:
        - 선행 API:
        - 선행 DB/마이그레이션:
        - 선행 인프라/환경변수:
        - 선행 정책/약관/동의:
        - 관련 이슈/PR:
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: 수락 기준
      description: 개발 완료 여부를 판단할 수 있도록 체크 가능한 기준으로 작성해 주세요.
      placeholder: |
        - [ ] 사용자는 지정된 화면에서 기능에 접근할 수 있다.
        - [ ] 정상 입력 시 기대한 결과가 서버 권위 기준으로 저장/반영된다.
        - [ ] 잘못된 입력, 권한 없음, 네트워크 오류, 서버 오류가 명확히 처리된다.
        - [ ] 급여·예산·지출·저축 계산이 관련 화면과 API 응답에서 일치한다.
        - [ ] 개인정보/민감정보 원문이 로그, 오류 메시지, 광고 데이터에 노출되지 않는다.
        - [ ] 관련 관리자/운영 기능이 필요한 경우 함께 동작한다.
        - [ ] 단위 테스트, API 테스트, E2E 또는 QA 시나리오가 작성된다.
        - [ ] 관련 문서와 체크리스트가 갱신된다.
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: 테스트/검증 계획
      description: 기능 검증에 필요한 단위/API/E2E/UAT/회귀 테스트를 작성해 주세요.
      placeholder: |
        - 단위 테스트:
        - API 테스트:
        - DB/마이그레이션 테스트:
        - E2E 테스트:
        - UAT 시나리오:
        - 회귀 테스트 범위:
        - 대표 디바이스/브라우저:
        - 실패/예외 케이스:
    validations:
      required: true

  - type: textarea
    id: release_impact
    attributes:
      label: 출시/배포 영향
      description: 배포, 플래그, 마이그레이션, 롤백, 사용자 공지 필요성을 작성해 주세요.
      placeholder: |
        - feature flag 필요 여부:
        - DB 마이그레이션 필요 여부:
        - 환경변수 추가 여부:
        - 배포 순서:
        - 롤백 방법:
        - 사용자 공지 필요 여부:
        - 관리자/CS 사전 안내 필요 여부:
        - 출시 차단 여부:
    validations:
      required: true

  - type: textarea
    id: success_metrics
    attributes:
      label: 성공 지표
      description: 기능 출시 후 성공 여부를 판단할 지표를 작성해 주세요.
      placeholder: |
        - 사용률:
        - 완료율:
        - 오류율:
        - 재방문/리텐션 영향:
        - 금액 계산 불일치 발생률:
        - CS/신고 감소 효과:
        - 광고/제휴 성과:
        - 운영 효율 지표:
    validations:
      required: false

  - type: textarea
    id: related_references
    attributes:
      label: 관련 문서/화면/API/DB/링크
      description: 연결해야 하는 문서, 화면 ID, 기능 ID, API, DB, 이슈, PR, 디자인 링크를 작성해 주세요.
      placeholder: |
        - 기준 문서:
        - 화면 ID:
        - 기능 ID:
        - API:
        - DB:
        - 테스트 케이스:
        - 디자인/프로토타입:
        - 관련 이슈:
        - 관련 PR/커밋:
    validations:
      required: false

  - type: checkboxes
    id: requester_checklist
    attributes:
      label: 요청자 체크리스트
      description: 기능 요청 등록 전 확인한 항목을 체크해 주세요.
      options:
        - label: 기존 이슈와 문서를 검색해 중복 여부를 확인했습니다.
          required: true
        - label: 해결할 문제와 수락 기준을 구분해서 작성했습니다.
          required: true
        - label: 기능 영향 영역과 구축 단계를 선택했습니다.
          required: true
        - label: 급여·예산·지출·저축 계산 영향이 있으면 계산 규칙을 작성했습니다.
          required: false
        - label: 개인정보/민감정보 원문을 입력하지 않았고 필요한 경우 마스킹했습니다.
          required: true
        - label: API/DB/관리자/QA/운영 영향이 있으면 해당 항목을 작성했습니다.
          required: false
        - label: 출시 차단 또는 보안/금액 정합성 이슈 가능성이 있으면 P0/P1로 지정했습니다.
          required: true

  - type: checkboxes
    id: triage_checklist
    attributes:
      label: PM/기술/QA 트리아지 체크리스트
      description: 담당자 배정 후 처리자가 확인합니다.
      options:
        - label: 우선순위와 구축 단계를 재검토했습니다.
          required: false
        - label: 요구사항을 개발 가능한 작업 단위로 분해했습니다.
          required: false
        - label: 화면/UX, API, DB, 테스트, 운영 영향 범위를 확인했습니다.
          required: false
        - label: 서버 권위 계산과 금액 정합성 영향 여부를 검토했습니다.
          required: false
        - label: 보안/개인정보/광고 데이터 분리 영향 여부를 검토했습니다.
          required: false
        - label: 관련 문서와 구현 체크리스트 갱신 필요성을 확인했습니다.
          required: false
        - label: 구현 PR, 테스트 결과, 릴리즈 계획을 이슈에 연결했습니다.
          required: false
