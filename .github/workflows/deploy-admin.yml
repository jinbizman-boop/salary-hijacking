name: deploy-admin

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/admin/**"
      - "packages/**"
      - "services/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/deploy-admin.yml"
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "apps/admin/**"
      - "packages/**"
      - "services/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/deploy-admin.yml"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deployment target"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.deploy_target || 'auto' }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CI: "true"
  NODE_ENV: test
  FORCE_COLOR: "1"
  TZ: Asia/Seoul
  ADMIN_APP_DIR: ${{ vars.ADMIN_APP_DIR || 'apps/admin' }}
  ADMIN_OPEN_NEXT_DIR: ${{ vars.ADMIN_OPEN_NEXT_DIR || 'apps/admin/.open-next' }}
  CLOUDFLARE_ADMIN_WORKER_NAME: ${{ vars.CLOUDFLARE_ADMIN_WORKER_NAME || 'salary-hijacking-admin' }}

jobs:
  verify-admin:
    name: Verify admin console
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify admin OpenNext Worker contract
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const adminAppDir = process.env.ADMIN_APP_DIR || "apps/admin";
          const openNextDir = process.env.ADMIN_OPEN_NEXT_DIR || "apps/admin/.open-next";
          const adminWorkerName = process.env.CLOUDFLARE_ADMIN_WORKER_NAME || "salary-hijacking-admin";

          const fail = (message) => {
            console.error(`::error::${message}`);
            process.exitCode = 1;
          };

          const requiredRootFiles = [
            "package.json",
            "pnpm-lock.yaml",
            "pnpm-workspace.yaml",
            ".github/workflows/deploy-admin.yml",
          ];

          for (const file of requiredRootFiles) {
            if (!fs.existsSync(file) || fs.statSync(file).size === 0) {
              fail(`Required repository file is missing or empty: ${file}`);
            }
          }

          if (!fs.existsSync(adminAppDir) || !fs.statSync(adminAppDir).isDirectory()) {
            fail(`Admin app directory does not exist: ${adminAppDir}`);
          }

          if (openNextDir === "." || openNextDir === "/" || openNextDir.trim() === "") {
            fail(`ADMIN_OPEN_NEXT_DIR is unsafe: ${openNextDir}`);
          }

          if (adminWorkerName !== "salary-hijacking-admin") {
            fail(`CLOUDFLARE_ADMIN_WORKER_NAME must be salary-hijacking-admin, got ${adminWorkerName}`);
          }

          const adminPackagePath = path.join(adminAppDir, "package.json");
          const openNextConfigPath = path.join(adminAppDir, "open-next.config.ts");
          const wranglerConfigPath = path.join(adminAppDir, "wrangler.jsonc");

          if (!fs.existsSync(adminPackagePath)) {
            fail(`Admin package.json does not exist: ${adminPackagePath}`);
          }

          if (!fs.existsSync(wranglerConfigPath)) {
            fail(`Admin wrangler.jsonc does not exist: ${wranglerConfigPath}`);
          }

          if (!fs.existsSync(openNextConfigPath)) {
            fail(`Admin open-next.config.ts does not exist: ${openNextConfigPath}`);
          }

          const rootPackage = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const adminPackage = JSON.parse(fs.readFileSync(adminPackagePath, "utf8"));
          const openNextConfig = fs.readFileSync(openNextConfigPath, "utf8");
          const wranglerConfig = fs.readFileSync(wranglerConfigPath, "utf8");

          if (!rootPackage.packageManager || !rootPackage.packageManager.startsWith("pnpm@")) {
            fail('Root package.json must define "packageManager": "pnpm@<version>".');
          }

          for (const script of ["build:cloudflare", "deploy:staging", "deploy:production"]) {
            if (!adminPackage.scripts || !adminPackage.scripts[script]) {
              fail(`Admin package.json must define script "${script}".`);
            }
          }

          for (const marker of [
            '"name": "salary-hijacking-admin"',
            '"main": ".open-next/worker.js"',
            '"directory": ".open-next/assets"',
            '"nodejs_compat"',
            '"observability"',
          ]) {
            if (!wranglerConfig.includes(marker)) {
              fail(`Admin wrangler.jsonc is missing required marker: ${marker}`);
            }
          }

          for (const marker of [
            "buildCommand",
            "corepack pnpm run build",
            "cloudflare-node",
            "cloudflare-edge",
            "node:crypto",
          ]) {
            if (!openNextConfig.includes(marker)) {
              fail(`Admin open-next.config.ts is missing required marker: ${marker}`);
            }
          }

          if (process.exitCode) {
            process.exit(process.exitCode);
          }

          console.log("Admin OpenNext Worker deployment contract verified.");
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint admin when configured
        run: |
          set -euo pipefail

          if node -e "const p=require('./${ADMIN_APP_DIR}/package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)"; then
            pnpm --dir "$ADMIN_APP_DIR" lint
          else
            echo "Admin lint script is not configured. Skipping."
          fi

      - name: Typecheck admin when configured
        run: |
          set -euo pipefail

          if node -e "const p=require('./${ADMIN_APP_DIR}/package.json'); process.exit(p.scripts && p.scripts.typecheck ? 0 : 1)"; then
            pnpm --dir "$ADMIN_APP_DIR" typecheck
          else
            echo "Admin typecheck script is not configured. Skipping."
          fi

      - name: Test admin when configured
        run: |
          set -euo pipefail

          if node -e "const p=require('./${ADMIN_APP_DIR}/package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
            pnpm --dir "$ADMIN_APP_DIR" test
          else
            echo "Admin test script is not configured. Skipping."
          fi

      - name: Build admin OpenNext Worker
        run: pnpm --dir "$ADMIN_APP_DIR" build:cloudflare

      - name: Verify admin OpenNext output
        run: |
          set -euo pipefail

          if [ ! -f "$ADMIN_OPEN_NEXT_DIR/worker.js" ]; then
            echo "::error::Admin OpenNext worker does not exist: $ADMIN_OPEN_NEXT_DIR/worker.js"
            exit 1
          fi

          if [ ! -d "$ADMIN_OPEN_NEXT_DIR/assets" ]; then
            echo "::error::Admin OpenNext assets directory does not exist: $ADMIN_OPEN_NEXT_DIR/assets"
            exit 1
          fi

          if [ -z "$(find "$ADMIN_OPEN_NEXT_DIR/assets" -type f | head -n 1)" ]; then
            echo "::error::Admin OpenNext assets directory is empty: $ADMIN_OPEN_NEXT_DIR/assets"
            exit 1
          fi

          echo "Admin OpenNext output verified: $ADMIN_OPEN_NEXT_DIR"

      - name: Scan admin OpenNext output for raw secret values
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const root = process.env.ADMIN_OPEN_NEXT_DIR || "apps/admin/.open-next";
          const secretPatterns = [
            /postgres(?:ql)?:\/\/[^\s"'`<>]+/i,
            /-----BEGIN (?:RSA |EC |OPENSSH |)PRIVATE KEY-----/,
            /\b(?:ghp|github_pat|sk-|napi_|xox[baprs]-)[A-Za-z0-9_-]{20,}\b/,
            /https:\/\/hooks\.slack\.com\/services\/[A-Za-z0-9/_-]+/i,
          ];

          const findings = [];
          const walk = (dir) => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const filePath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(filePath);
                continue;
              }
              if (!entry.isFile()) continue;
              const data = fs.readFileSync(filePath);
              if (data.includes(0)) continue;
              const text = data.toString("utf8");
              for (const pattern of secretPatterns) {
                if (pattern.test(text)) {
                  findings.push(filePath);
                  break;
                }
              }
            }
          };

          walk(root);
          if (findings.length > 0) {
            console.error(`::error::Potential raw secret values found in admin OpenNext output: ${findings.join(", ")}`);
            process.exit(1);
          }

          console.log("No raw secret value patterns found in admin OpenNext output.");
          NODE

      - name: Upload admin OpenNext artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-opennext-${{ github.run_attempt }}
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14
          path: ${{ env.ADMIN_OPEN_NEXT_DIR }}/**

  deploy-admin:
    name: Deploy admin console
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - verify-admin
    if: github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ (github.ref_name == 'main' || inputs.deploy_target == 'production') && 'admin-production' || 'admin-preview' }}

    permissions:
      contents: read
      deployments: write

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Validate deployment secrets
        run: |
          set -euo pipefail

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Missing secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          if [ "${CLOUDFLARE_ADMIN_WORKER_NAME:-}" != "salary-hijacking-admin" ]; then
            echo "::error::CLOUDFLARE_ADMIN_WORKER_NAME must be salary-hijacking-admin"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin OpenNext Worker for deployment
        run: pnpm --dir "$ADMIN_APP_DIR" build:cloudflare

      - name: Verify deployment output
        run: |
          set -euo pipefail

          if [ ! -f "$ADMIN_OPEN_NEXT_DIR/worker.js" ]; then
            echo "::error::Admin OpenNext worker does not exist: $ADMIN_OPEN_NEXT_DIR/worker.js"
            exit 1
          fi

          if [ ! -d "$ADMIN_OPEN_NEXT_DIR/assets" ]; then
            echo "::error::Admin OpenNext assets directory does not exist: $ADMIN_OPEN_NEXT_DIR/assets"
            exit 1
          fi

      - name: Resolve Cloudflare Worker environment
        id: deploy_context
        run: |
          set -euo pipefail

          DEPLOY_TARGET="${{ inputs.deploy_target || '' }}"

          if [ "${GITHUB_REF_NAME:-}" = "main" ] || [ "$DEPLOY_TARGET" = "production" ]; then
            WRANGLER_ENV="production"
            WORKER_NAME="salary-hijacking-admin"
          else
            WRANGLER_ENV="staging"
            WORKER_NAME="salary-hijacking-admin-staging"
          fi

          echo "wrangler_env=$WRANGLER_ENV" >> "$GITHUB_OUTPUT"
          echo "worker_name=$WORKER_NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved Cloudflare Worker env: $WRANGLER_ENV"
          echo "Resolved Cloudflare Worker name: $WORKER_NAME"

      - name: Deploy admin OpenNext Worker
        id: cloudflare_deploy
        run: |
          set -euo pipefail

          pnpm --dir "$ADMIN_APP_DIR" exec wrangler deploy --env "${{ steps.deploy_context.outputs.wrangler_env }}" --config wrangler.jsonc --keep-vars

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "## Salary Hijacking admin deployment"
            echo ""
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Repository: $GITHUB_REPOSITORY"
            echo "- Ref: $GITHUB_REF"
            echo "- Ref name: $GITHUB_REF_NAME"
            echo "- Commit: $GITHUB_SHA"
            echo "- Admin app dir: $ADMIN_APP_DIR"
            echo "- OpenNext output dir: $ADMIN_OPEN_NEXT_DIR"
            echo "- Cloudflare Worker env: ${{ steps.deploy_context.outputs.wrangler_env }}"
            echo "- Cloudflare Worker name: ${{ steps.deploy_context.outputs.worker_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
