<!DOCTYPE html>

<html class="light" lang="ko"><head>

                        "tertiary-fixed-dim": "#ffb2b9",
                        "secondary-fixed-dim": "#e7c43f",
                        "primary-container": "#078648",
                        "on-secondary-container": "#745f00",
                        "tertiary": "#9e394a",

<style>
        @keyframes subtle-glow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }
        .glow-effect {
            animation: subtle-glow 4s ease-in-out infinite;
            filter: blur(80px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed antialiased overflow-hidden">
<!-- Top App Bar (Center Aligned for Focus) -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-md flex justify-between items-center px-6 py-4 border-b border-outline-variant">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors duration-150 active:scale-95">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md text-on-surface">Mission Details</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors duration-150 active:scale-95">
<span class="material-symbols-outlined text-on-surface">more_vert</span>
</button>
</header>
<main class="relative min-h-screen flex flex-col items-center justify-center px-container-padding pt-20 pb-32">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="glow-effect absolute -top-20 -left-20 w-[400px] h-[400px] bg-primary/20 rounded-full"></div>
<div class="glow-effect absolute top-1/2 -right-40 w-[500px] h-[500px] bg-secondary-container/30 rounded-full"></div>
</div>
<!-- Level Up Card (Main Celebration) -->
<div class="relative z-10 w-full max-w-md flex flex-col items-center">
<!-- Success Icon / Brand Mark -->
<div class="mb-stack-gap-lg relative">
<div class="absolute inset-0 bg-primary/10 blur-2xl rounded-full scale-150"></div>
<div class="relative w-40 h-40 flex items-center justify-center">
<img class="w-full h-full object-contain drop-shadow-2xl" data-alt="A premium 3D emerald and gold shield emblem with a white checkmark inside, surrounded by a glowing green orbital ring and rising financial bar charts, high-gloss finish, gamified financial achievement style, centered in a bright studio environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtn1InQNYIw9WsjPR_PM15A4anwFBQ-Gx7gS1YoTFkkK72LvtmBjc_kpGiv6rPIvzG7hfyF6LOKy0TSrH_klQ26sAv9rRdt74SrFbX1_Z_XdSafr5VRlRtJm0Pp48Pk97jU6N34adjKfrSS32dCaP7MaILebCTfogiSFflXqhJdNpcXF4Kg7cWUsL1wZHQN_PEr3qu0d412RxiOT8K8DcBUIqUD72jBRYULlYju_KareMN4OQ5jy5I"/>
</div>
</div>
<!-- Headline -->
<div class="text-center mb-stack-gap-lg">
<h2 class="text-headline-lg font-headline-lg text-primary mb-unit">레벨이 올랐어요!</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">성공적인 자산 관리가 이어지고 있어요.</p>
</div>
<!-- Level Progression Visual -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-[24px] p-6 shadow-sm mb-stack-gap-lg">
<div class="flex items-center justify-between mb-stack-gap-md">
<div class="flex flex-col items-center">
<span class="text-label-bold font-label-bold text-on-surface-variant uppercase tracking-widest mb-1">PREVIOUS</span>
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-outline-variant">
<span class="text-headline-md font-headline-md text-outline">18</span>
</div>
</div>
<div class="flex flex-col items-center grow">
<span class="material-symbols-outlined text-primary scale-125 mb-1">trending_up</span>
<div class="h-[2px] w-full bg-gradient-to-r from-outline-variant via-primary to-secondary-container"></div>
</div>
<div class="flex flex-col items-center">
<span class="text-label-bold font-label-bold text-primary uppercase tracking-widest mb-1">LEVEL UP</span>
<div class="w-20 h-20 rounded-full bg-primary-container flex items-center justify-center border-4 border-secondary-container shadow-lg shadow-primary/20">
<span class="text-display-level font-display-level text-on-primary-container text-[32px]">19</span>
</div>
</div>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-stack-gap-md pt-stack-gap-md border-t border-outline-variant">
<div class="flex flex-col">
<div class="flex items-center gap-1 mb-1">
<span class="material-symbols-outlined text-primary text-[16px]">stars</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">현재 XP</span>
</div>
<span class="text-headline-md font-headline-md text-on-surface">15 / 550</span>
</div>
<div class="flex flex-col">
<div class="flex items-center gap-1 mb-1">
<span class="material-symbols-outlined text-on-secondary-fixed-variant text-[16px] fill-icon">local_fire_department</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">연속 수행일</span>
</div>
<span class="text-headline-md font-headline-md text-on-surface">8일차 🔥</span>
</div>
</div>
</div>
<!-- XP Progress Bar (Detail) -->
<div class="w-full px-2 mb-stack-gap-lg">
<div class="flex justify-between items-end mb-2">
<span class="text-label-bold font-label-bold text-on-surface-variant">NEXT LV 20</span>
<span class="text-label-bold font-label-bold text-primary">2.7%</span>
</div>
<div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-[2.7%] rounded-full shadow-[0_0_8px_rgba(0,106,55,0.4)]"></div>
</div>
</div>
</div>
</main>
<!-- Bottom Actions Container -->
<section class="fixed bottom-0 left-0 w-full p-container-padding space-y-3 bg-gradient-to-t from-background via-background to-transparent pt-10">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-label-bold text-body-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:bg-primary-container transition-all active:scale-95 duration-150">
            새로운 레벨 확인하기
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full h-14 bg-surface-container-lowest text-primary border border-primary/20 rounded-xl font-label-bold text-body-lg flex items-center justify-center gap-2 hover:bg-surface transition-all active:scale-95 duration-150">
<span class="material-symbols-outlined">share</span>
            인증글로 공유하기
        </button>
</section>
<!-- Navigation Shell Placeholder (Suppressed as per rules for Transactional/Confirmation screen) -->
<!-- But implementing structure if needed for context -->
<script>
        // Micro-interaction for the level badge
        document.addEventListener('DOMContentLoaded', () => {
            const badge = document.querySelector('.bg-primary-container');
            if (badge) {
                badge.style.transform = 'scale(0.5)';
                badge.style.opacity = '0';
                setTimeout(() => {
                    badge.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    badge.style.transform = 'scale(1)';
                    badge.style.opacity = '1';
                }, 300);
            }
        });
    </script>
</body></html>
