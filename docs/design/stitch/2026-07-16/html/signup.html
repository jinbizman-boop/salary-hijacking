<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #FFFFFF;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none !important;
            border-color: #209252 !important;
            box-shadow: 0 0 0 1px #209252 !important;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-dim": "#d1dbe8",
                      "secondary": "#5f5e5e",
                      "on-primary-container": "#f6fff4",
                      "surface": "#f7f9ff",
                      "on-error": "#ffffff",
                      "error": "#ba1a1a",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-fixed": "#1c1b1b",
                      "on-tertiary-fixed": "#191c1e",
                      "outline": "#6e7a6f",
                      "on-tertiary-container": "#fbfdff",
                      "tertiary-container": "#727577",
                      "on-background": "#131c26",
                      "on-primary": "#ffffff",
                      "tertiary": "#595c5e",
                      "primary-fixed-dim": "#72dc93",
                      "inverse-primary": "#72dc93",
                      "on-tertiary-fixed-variant": "#444749",
                      "on-secondary": "#ffffff",
                      "on-primary-fixed-variant": "#005229",
                      "inverse-surface": "#28313b",
                      "outline-variant": "#bdcabd",
                      "surface-container-low": "#edf4ff",
                      "tertiary-fixed": "#e0e3e5",
                      "on-secondary-container": "#656464",
                      "on-surface": "#131c26",
                      "surface-bright": "#f7f9ff",
                      "surface-container": "#e5effc",
                      "primary-fixed": "#8ef9ad",
                      "secondary-fixed-dim": "#c8c6c5",
                      "on-tertiary": "#ffffff",
                      "surface-container-high": "#dfe9f6",
                      "on-error-container": "#93000a",
                      "on-secondary-fixed-variant": "#474646",
                      "error-container": "#ffdad6",
                      "secondary-fixed": "#e5e2e1",
                      "on-primary-fixed": "#00210d",
                      "primary": "#209252",
                      "inverse-on-surface": "#e8f2ff",
                      "surface-variant": "#d9e3f1",
                      "secondary-container": "#e5e2e1",
                      "tertiary-fixed-dim": "#c4c7c9",
                      "background": "#f7f9ff",
                      "surface-container-highest": "#d9e3f1",
                      "on-surface-variant": "#3e4a40",
                      "primary-container": "#078648",
                      "surface-tint": "#006d39"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-page": "24px",
                      "gutter-grid": "12px",
                      "stack-xl": "48px",
                      "stack-md": "16px",
                      "stack-sm": "8px",
                      "stack-lg": "32px"
              },
              "fontFamily": {
                      "headline-lg": ["Noto Sans KR"],
                      "headline-md": ["Noto Sans KR"],
                      "display-lg": ["Noto Sans KR"],
                      "body-md": ["Noto Sans KR"],
                      "body-lg": ["Noto Sans KR"],
                      "label-sm": ["Noto Sans KR"],
                      "label-lg": ["Noto Sans KR"]
              },
              "fontSize": {
                      "headline-lg": ["24px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "700"}],
                      "display-lg": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "body-lg": ["17px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
                      "label-lg": ["14px", {"lineHeight": "1.4", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
</head>
<body class="flex flex-col min-h-screen bg-white">
<!-- Progress Bar -->
<div class="fixed top-0 left-0 w-full h-[2px] bg-surface-variant z-[60]">
<div class="h-full bg-primary transition-all duration-500 ease-out" style="width: 25%;"></div>
</div>
<!-- Top AppBar (56px) -->
<header class="flex items-center justify-between px-margin-page h-[56px] w-full z-50 bg-white sticky top-0 border-b border-transparent">
<button aria-label="뒤로 가기" class="active:opacity-70 transition-opacity p-1 -ml-2">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex-1 text-center">
<span class="font-label-lg text-label-lg text-on-surface-variant">본인인증</span>
</div>
<button aria-label="닫기" class="active:opacity-70 transition-opacity p-1 -mr-2">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
</header>
<main class="flex-grow px-margin-page pt-stack-md pb-40 no-scrollbar overflow-y-auto">
<!-- Headline & Supporting Text -->
<div class="mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">
                사용할 계정정보를<br/>입력해 주세요
            </h1>
<p class="font-body-md text-body-md text-[#6B737C]">
                로그인과 계정 복구에 사용할 정보예요.
            </p>
</div>
<!-- Form Section -->
<div class="space-y-stack-lg">
<!-- ID Field -->
<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface mb-stack-sm" for="user-id">아이디</label>
<div class="relative flex items-center gap-2">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border border-outline-variant rounded-[12px] font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:border-primary transition-colors" id="user-id" placeholder="아이디를 입력해 주세요" type="text"/>
<button class="shrink-0 h-[52px] px-4 bg-secondary-container text-on-secondary-container font-label-lg text-label-lg rounded-[12px] hover:bg-surface-variant active:scale-95 transition-all">
                        중복 확인
                    </button>
</div>
</div>
<!-- Email Field -->
<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface mb-stack-sm" for="user-email">이메일</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border border-outline-variant rounded-[12px] font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:border-primary transition-colors" id="user-email" inputmode="email" placeholder="example@email.com" type="email"/>
</div>
</div>
<!-- Nickname Field -->
<div class="group">
<label class="block font-label-lg text-label-lg text-on-surface mb-stack-sm" for="user-nickname">닉네임</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border border-outline-variant rounded-[12px] font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:border-primary transition-colors" id="user-nickname" placeholder="앱에서 사용할 닉네임을 입력해 주세요" type="text"/>
</div>
</div>
</div>
<!-- Branding removed from content per request (Only on Intro/Completion) -->
</main>
<!-- Sticky Bottom Primary Button -->
<div class="fixed bottom-0 left-0 w-full px-margin-page pb-[34px] pt-4 bg-gradient-to-t from-white via-white to-transparent z-[55]">
<button class="w-full h-[52px] bg-[#209252] text-white font-headline-md text-headline-md rounded-[12px] shadow-md active:scale-[0.98] transition-all disabled:opacity-30 disabled:pointer-events-none" id="next-btn">
            다음
        </button>
</div>
<script>
        const inputs = document.querySelectorAll('input');
        const nextBtn = document.getElementById('next-btn');

        const validate = () => {
            const allFilled = Array.from(inputs).every(input => input.value.trim().length > 0);
            if (allFilled) {
                nextBtn.removeAttribute('disabled');
            } else {
                nextBtn.setAttribute('disabled', 'true');
            }
        };

        inputs.forEach(input => {
            input.addEventListener('input', validate);
        });

        validate();
    </script>
</body></html>
