<!DOCTYPE html><html class="light" lang="ko"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .achievement-yellow-text { color: #F7D34D; }
        .achievement-yellow-bg { background-color: #F7D34D; }

        /* Glassmorphism & Depth */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #EEEEEE;
        }

        /* Smooth interactions */
        .active-tap:active {
            transform: scale(0.97);
            transition: transform 0.1s ease-out;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.8s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#e0e3e5",
                        "tertiary-container": "#727577",
                        "outline-variant": "#bdcabd",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#006d39",
                        "surface-variant": "#d9e3f1",
                        "on-tertiary-container": "#fbfdff",
                        "primary-fixed-dim": "#72dc93",
                        "inverse-on-surface": "#e8f2ff",
                        "inverse-primary": "#72dc93",
                        "secondary-fixed-dim": "#c8c6c5",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#444749",
                        "secondary-container": "#e5e2e1",
                        "on-primary-fixed": "#00210d",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9ff",
                        "on-tertiary-fixed": "#191c1e",
                        "secondary-fixed": "#e5e2e1",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#28313b",
                        "secondary": "#5f5e5e",
                        "outline": "#6e7a6f",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-surface-variant": "#3e4a40",
                        "on-primary-fixed-variant": "#005229",
                        "on-tertiary": "#ffffff",
                        "on-background": "#131c26",
                        "primary-container": "#078648",
                        "on-surface": "#131c26",
                        "surface-container-low": "#edf4ff",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary": "#595c5e",
                        "surface-container-high": "#dfe9f6",
                        "surface-container": "#e5effc",
                        "primary": "#006a37",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary-container": "#f6fff4",
                        "background": "#f7f9ff",
                        "primary-fixed": "#8ef9ad",
                        "surface-container-highest": "#d9e3f1",
                        "surface-dim": "#d1dbe8",
                        "on-secondary-container": "#656464",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-bright": "#f7f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-xl": "48px",
                        "stack-sm": "8px",
                        "gutter-grid": "12px",
                        "stack-md": "16px",
                        "margin-page": "24px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Noto Sans KR"],
                        "display-lg": ["Noto Sans KR"],
                        "label-lg": ["Noto Sans KR"],
                        "label-sm": ["Noto Sans KR"],
                        "body-md": ["Noto Sans KR"],
                        "body-lg": ["Noto Sans KR"],
                        "headline-lg": ["Noto Sans KR"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "700"}],
                        "display-lg": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-lg": ["14px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
                        "body-md": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["17px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-page h-[56px] bg-surface border-b border-outline-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[24px]">payments</span>
<h1 class="text-[18px] font-bold text-[#24312A] tracking-tight">SALARY HIJACKING</h1>
</div>
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</button>
</header>
<main class="pt-[56px] pb-[120px]">
<!-- Header Section -->
<section class="px-margin-page pt-stack-lg pb-stack-md">
<h2 class="font-display-lg text-display-lg">이번 달 계획</h2>
<p class="font-body-md text-on-surface-variant mt-1">철저한 납치로 자산을 지키세요.</p>
</section>
<!-- GoalProgressCard (Bento Layout) -->
<div class="px-margin-page space-y-stack-md">
<div class="glass-card rounded-xl p-stack-md shadow-sm flex items-center justify-between overflow-hidden relative">
<div class="z-10">
<p class="font-label-lg text-secondary">목표 달성률</p>
<div class="flex items-baseline gap-1 mt-1">
<span class="font-headline-lg text-headline-lg achievement-yellow-text">82%</span>
<span class="font-label-sm text-on-surface-variant">진행 중</span>
</div>
</div>
<!-- Circular Progress SVG -->
<div class="relative w-20 h-20">
<svg class="w-full h-full" viewBox="0 0 100 100">
<circle cx="50" cy="50" fill="transparent" r="40" stroke="#F2F4F6" stroke-width="12"></circle>
<circle class="progress-ring-circle" cx="50" cy="50" fill="transparent" r="40" stroke="#F7D34D" stroke-dasharray="251.2" stroke-dashoffset="45.2" stroke-linecap="round" stroke-width="12" style="stroke-dashoffset: 45.2;"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-[#F7D34D] text-[20px]">stars</span>
</div>
</div>
<!-- Decorative element -->
<div class="absolute -right-4 -bottom-4 w-24 h-24 bg-surface-container-high rounded-full opacity-30"></div>
</div>
<!-- PlanSummaryCard -->
<div class="bg-primary p-stack-md rounded-xl text-on-primary shadow-lg overflow-hidden relative">
<div class="relative z-10">
<div class="flex justify-between items-start mb-4">
<p class="font-label-lg opacity-90">이번 달 급여 납치 계획</p>
<span class="material-symbols-outlined opacity-50">account_balance_wallet</span>
</div>
<p class="font-label-sm opacity-80">예상 납치 금액</p>
<p class="font-display-lg text-display-lg mt-1">1,000,000원</p>
</div>
<!-- Abstract Background Pattern -->
<div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
<div class="absolute bottom-0 left-0 w-24 h-24 bg-black/5 rounded-full -ml-8 -mb-8 blur-xl"></div>
</div>
<!-- Breakdown Grid -->
<div class="grid grid-cols-2 gap-gutter-grid">
<!-- 고정지출 -->
<div class="glass-card rounded-xl p-stack-md">
<div class="flex items-center gap-2 mb-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[18px]">receipt_long</span>
</div>
<span class="font-label-lg">고정지출</span>
</div>
<div class="space-y-2">
<div>
<p class="font-label-sm text-secondary">계획</p>
<p class="font-label-lg">600,000원</p>
</div>
<div class="pt-2 border-t border-outline-variant/30">
<p class="font-label-sm text-secondary">납부 완료</p>
<p class="font-label-lg text-primary">570,000원</p>
</div>
</div>
</div>
<!-- 고정저축 -->
<div class="glass-card rounded-xl p-stack-md">
<div class="flex items-center gap-2 mb-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[18px]">savings</span>
</div>
<span class="font-label-lg">고정저축</span>
</div>
<div class="space-y-2">
<div>
<p class="font-label-sm text-secondary">계획</p>
<p class="font-label-lg">400,000원</p>
</div>
<div class="pt-2 border-t border-outline-variant/30">
<p class="font-label-sm text-secondary">저축 완료</p>
<p class="font-label-lg text-primary">400,000원</p>
</div>
</div>
</div>
</div>
<!-- Daily Expense Summary -->
<div class="glass-card rounded-xl p-stack-md">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">schedule</span>
<h3 class="font-headline-md text-headline-md">일일 생활비</h3>
</div>
<span class="px-2 py-0.5 bg-surface-container-highest rounded text-[11px] font-bold text-secondary">자동 산출</span>
</div>
<div class="flex items-center justify-between">
<div>
<p class="font-label-sm text-secondary">하루 권장 금액</p>
<p class="font-headline-lg text-headline-lg">25,000원</p>
</div>
<div class="text-right">
<p class="font-label-sm text-secondary">이번 달 잔여</p>
<p class="font-label-lg">350,000원</p>
</div>
</div>
</div>
</div>
<!-- Call to Action -->
<div class="px-margin-page mt-stack-xl">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-bold text-[17px] shadow-md hover:bg-primary-container active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">edit</span>
                계획 수정하기
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface border-t border-outline-variant h-[64px] pb-safe">
<button class="flex flex-col items-center justify-center text-secondary active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-label-sm text-label-sm mt-1">급여</span>
</button>
<!-- ACTIVE TAB: 계획 -->
<button class="flex flex-col items-center justify-center text-primary font-semibold active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">event_note</span>
<span class="font-label-sm text-label-sm mt-1">계획</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined">trending_up</span>
<span class="font-label-sm text-label-sm mt-1">LV UP</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined">groups</span>
<span class="font-label-sm text-label-sm mt-1">커뮤니티</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined">person</span>
<span class="font-label-sm text-label-sm mt-1">MY</span>
</button>
</nav>
<script>
        // Simple micro-interaction for the circular progress
        window.addEventListener('DOMContentLoaded', () => {
            const circle = document.querySelector('.progress-ring-circle');
            if (circle) {
                // Trigger animation after a small delay
                setTimeout(() => {
                    // Set to 82%
                    // Formula: dashoffset = circumference * (1 - percentage)
                    // 251.2 * (1 - 0.82) = 45.216
                    circle.style.strokeDashoffset = '45.2';
                }, 300);
            }
        });
    </script>
</body></html>
