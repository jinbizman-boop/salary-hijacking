<style>

      min-height: max(884px, 100dvh);
    }

<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed overflow-x-hidden">
<!-- Top AppBar (Injected from JSON Logic) -->
<header class="bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline docked full-width top-0 z-50 transition-all">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-xl mx-auto">
<button aria-label="Back" class="hover:opacity-80 transition-opacity flex items-center justify-center p-1">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md text-on-surface dark:text-inverse-on-surface">Mission Details</h1>
<button aria-label="More Options" class="hover:opacity-80 transition-opacity flex items-center justify-center p-1">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-between px-container-padding py-stack-gap-lg max-w-xl mx-auto w-full">
<!-- Mission Header & Progress -->
<section class="w-full text-center mt-4">
<div class="inline-flex items-center gap-2 mb-2">
<div class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-label-bold font-label-bold flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="menu_book">menu_book</span>
                    Lv. 2 MISSION
                </div>
</div>
<h2 class="text-headline-lg font-headline-lg text-primary mb-6">오늘 5분만 읽기</h2>
<!-- Step Indicator -->
<div class="flex justify-center items-center gap-3 mb-10">
<div class="h-1.5 w-12 rounded-full bg-primary-container"></div>
<div class="h-1.5 w-12 rounded-full bg-primary relative overflow-hidden">
<div class="absolute inset-0 bg-white/30 animate-pulse"></div>
</div>
<div class="h-1.5 w-12 rounded-full bg-outline-variant"></div>
</div>
</section>
<!-- Hero Timer Section -->
<section class="relative w-full flex flex-col items-center">
<!-- Decorative Background Shader Placeholder -->
<div class="absolute inset-0 -z-10 opacity-40 scale-125">

</div>
<!-- Central Timer Display -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- SVG Progress Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-surface-container" cx="128" cy="128" fill="none" r="110" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary transition-all duration-1000 timer-glow" cx="128" cy="128" fill="none" id="timerCircle" r="110" stroke="currentColor" stroke-dasharray="691" stroke-dashoffset="172" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="text-center">
<span class="text-display-level font-display-level text-on-surface tabular-nums tracking-tighter" id="countdown">05:00</span>
<p class="text-label-bold font-label-bold text-outline uppercase tracking-widest mt-1">Remaining</p>
</div>
</div>
<!-- Supporting Prompt Card -->
<div class="mt-12 w-full max-w-sm glass-card border border-outline-variant/30 rounded-xl p-5 shadow-sm flex items-start gap-4 animate-pulse-soft">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div>
<p class="text-body-md font-body-md text-on-surface-variant leading-relaxed">
                        읽으면서 기억하고 싶은 개념 <span class="text-primary font-bold">하나</span>를 생각해 보세요.
                    </p>
</div>
</div>
</section>
<!-- Action Controls -->
<section class="w-full flex flex-col gap-gutter mt-12 pb-8">
<div class="grid grid-cols-2 gap-gutter">
<!-- Pause/Continue Toggle -->
<button class="flex flex-col items-center justify-center py-4 bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 rounded-xl border border-outline-variant/50 group" id="toggleBtn">
<div class="w-12 h-12 rounded-full bg-white flex items-center justify-center mb-2 shadow-sm group-hover:shadow-md transition-shadow">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="pause" id="toggleIcon">pause</span>
</div>
<span class="text-label-bold font-label-bold text-on-surface-variant" id="toggleText">일시정지</span>
</button>
<!-- Finish Early -->
<button class="flex flex-col items-center justify-center py-4 bg-surface-container-low hover:bg-surface-container transition-all active:scale-95 rounded-xl border border-outline-variant/50 group">
<div class="w-12 h-12 rounded-full bg-white flex items-center justify-center mb-2 shadow-sm group-hover:shadow-md transition-shadow">
<span class="material-symbols-outlined text-error" data-icon="stop">stop</span>
</div>
<span class="text-label-bold font-label-bold text-on-surface-variant">읽기 종료</span>
</button>
</div>
<!-- Primary Resume (If paused) -->
<button class="hidden w-full h-[56px] bg-primary text-white font-label-bold rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform" id="resumeHeroBtn">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                계속하기
            </button>
</section>
</main>
<!-- Visual Decoration (Floating achievement elements) -->
<div class="fixed top-32 -right-4 w-24 h-24 opacity-10 pointer-events-none">
<img class="w-full h-full object-contain" data-alt="A premium 3D emerald shield with a golden checkmark floating in the air, captured with cinematic lighting and soft depth of field. The style is consistent with high-end mobile app iconography, featuring smooth plastic textures and vibrant green and gold colors. Soft ambient occlusion and realistic reflections highlight the object's depth and premium quality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8n_8p3pFqlwc04ZXG7cZ3IdBGEfNHBRNwD4XDTs2nDX-lpabfnoG_4K2XGb8shTTz5Nj8orVspvaQ2f35jKSFJmECYLK_4sZG8N-ESEGQml31OmPOnVX99sPH1N2My-Vm-d6Od0Di0uZj7YBgKAt9FPCxSqtjkxGmL-TiJbUHRjwcoH26fvsZUdAbr40cRbM4EPT72Rx-s0sSA-9nWnxQ3F-ItoUTM6yJKUAVELoq7SN1qcu378Ar"/>
</div>
<!-- Scripting for Timer logic and interactions -->
<script>
        let timeLeft = 300; // 5 minutes
        let isRunning = true;
        let timerInterval;

        const display = document.getElementById('countdown');
        const circle = document.getElementById('timerCircle');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleIcon = document.getElementById('toggleIcon');
        const toggleText = document.getElementById('toggleText');
        const resumeHeroBtn = document.getElementById('resumeHeroBtn');

        const totalDash = 691;

        function updateTimer() {
            if (!isRunning) return;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                display.innerText = "00:00";
                return;
            }

            timeLeft--;

            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            display.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // Update Progress Ring
            const progress = timeLeft / 300;
            circle.style.strokeDashoffset = totalDash * (1 - progress);
        }

        function toggleTimer() {
            isRunning = !isRunning;
            if (isRunning) {
                toggleIcon.innerText = 'pause';
                toggleText.innerText = '일시정지';
                resumeHeroBtn.classList.add('hidden');
                toggleBtn.classList.remove('hidden');
            } else {
                toggleIcon.innerText = 'play_arrow';
                toggleText.innerText = '계속하기';
                // For dramatic effect on pause, we show a bigger hero button if needed
                // resumeHeroBtn.classList.remove('hidden');
            }
        }

        toggleBtn.addEventListener('click', toggleTimer);
        resumeHeroBtn.addEventListener('click', toggleTimer);

        timerInterval = setInterval(updateTimer, 1000);

        // Micro-interaction: Active state logic simulation
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
</body></html>
