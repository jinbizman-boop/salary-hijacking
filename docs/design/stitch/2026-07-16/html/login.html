<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            border-width: 2px !important;
            border-color: #209252 !important;
        }
        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1.5px solid #E5E8EB;
            border-radius: 4px;
            background-color: #fff;
            cursor: pointer;
            position: relative;
        }
        .custom-checkbox:checked {
            background-color: #209252;
            border-color: #209252;
        }
        .custom-checkbox:checked::after {
            content: 'check';
            font-family: 'Material Symbols Outlined';
            font-size: 16px;
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#209252",
                        "on-surface-variant": "#3e4a40",
                        "surface": "#f7f9ff",
                        "outline-variant": "#bdcabd",
                        "on-surface": "#131c26",
                        "brand-kakao": "#FEE500",
                        "brand-naver": "#03C75A",
                        "input-bg": "#F7F8FA",
                        "input-border": "#E5E8EB"
                    },
                    "borderRadius": {
                        "xl": "12px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-xl": "48px",
                        "stack-md": "16px",
                        "margin-page": "24px",
                        "stack-sm": "8px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Noto Sans KR"],
                        "label-lg": ["Noto Sans KR"],
                        "headline-md": ["Noto Sans KR"],
                        "label-sm": ["Noto Sans KR"],
                        "display-lg": ["Noto Sans KR"],
                        "headline-lg": ["Noto Sans KR"],
                        "body-lg": ["Noto Sans KR"]
                    },
                    "fontSize": {
                        "body-md": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "label-lg": ["14px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "500"}],
                        "display-lg": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["17px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-on-surface min-h-screen flex flex-col items-center">
<!-- Top App Bar -->
<header class="w-full h-14 flex items-center px-margin-page sticky top-0 bg-white z-50">
<button class="material-symbols-outlined text-on-surface" onclick="history.back()">arrow_back</button>
</header>
<main class="w-full max-w-[390px] px-margin-page flex flex-col flex-grow">
<!-- Brand Lockup -->
<section class="flex flex-col items-center pt-stack-xl pb-stack-xl">
<img alt="Salary Hijacking Logo" class="w-[104px] h-[104px] mb-4 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4ahh1hsZsyoc95616FkM-v48hzNF7_7cHc-Q6OFOm43R80zeDilSpjWNCROwM1FKxIqXlrYlzY4VHs6hDizMcufdRIFM6iuzLLKGDJ-FVfppy_gOGlAE8wwYEfN5ltlgbbSmcVTRw8IWszhSUy_b082Y3q0yZc49wzcwy8iQIOB5iGWwH4viR6eO73YSAlwloLynfmP5GaosjuefYVn7b5rJk95ckEv8V9EWgJFeDinQCQoMll3nuB0zb89mIy2C0-Q"/>
<div class="text-center">
<h1 class="text-[40px] font-extrabold leading-tight tracking-tight text-[#209252]">급여납치</h1>
<p class="text-[17px] font-bold tracking-[0.05em] text-[#34383D] mt-1">SALARY HIJACKING</p>
</div>
</section>
<!-- Credential Form -->
<section class="space-y-4">
<!-- ID Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface">아이디</label>
<input class="w-full h-[52px] px-4 bg-input-bg border border-[#E5E8EB] rounded-xl text-[16px] placeholder:text-slate-400 transition-all" placeholder="아이디 또는 이메일을 입력해 주세요" type="text"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface">비밀번호</label>
<div class="relative">
<input class="w-full h-[52px] px-4 pr-12 bg-input-bg border border-[#E5E8EB] rounded-xl text-[16px] placeholder:text-slate-400 transition-all" id="password-input" placeholder="비밀번호를 입력해 주세요" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Utility Row -->
<div class="flex items-center justify-between pt-1">
<label class="flex items-center gap-2 cursor-pointer select-none">
<input class="custom-checkbox" type="checkbox"/>
<span class="text-label-lg font-medium text-slate-600">자동 로그인</span>
</label>
<a class="text-label-lg font-medium text-slate-400 hover:text-slate-600" href="#">비밀번호 찾기</a>
</div>
<!-- Login Button -->
<button class="w-full h-[52px] bg-[#209252] opacity-40 text-white font-bold text-[17px] rounded-xl mt-4 active:scale-[0.98] transition-all" disabled="" id="login-submit">
                로그인
            </button>
</section>
<!-- Social Login Area -->
<section class="mt-stack-xl mb-10">
<div class="flex items-center gap-3 mb-stack-md">
<div class="h-[1px] flex-grow bg-input-border"></div>
<span class="text-label-sm text-slate-400 whitespace-nowrap">또는 간편 로그인</span>
<div class="h-[1px] flex-grow bg-input-border"></div>
</div>
<div class="grid grid-cols-2 gap-3">
<!-- Kakao -->
<button class="h-[52px] bg-[#FEE500] rounded-xl flex items-center justify-center px-4 gap-2 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="text-label-sm font-bold text-black/80">카카오</span>
</button>
<!-- Naver -->
<button class="h-[52px] bg-[#03C75A] rounded-xl flex items-center justify-center px-4 gap-2 active:opacity-80 transition-opacity">
<span class="font-black text-white text-[16px]">N</span>
<span class="text-label-sm font-bold text-white">네이버</span>
</button>
<!-- Google -->
<button class="h-[52px] bg-white border border-[#E5E8EB] rounded-xl flex items-center justify-center px-4 gap-2 active:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-[20px] text-red-500">google</span>
<span class="text-label-sm font-bold text-slate-700">Google</span>
</button>
<!-- Apple -->
<button class="h-[52px] bg-black rounded-xl flex items-center justify-center px-4 gap-2 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[20px] text-white" style="font-variation-settings: 'FILL' 1;">apps</span>
<span class="text-label-sm font-bold text-white">Apple</span>
</button>
</div>
</section>
<!-- Footer Links -->
<section class="mt-auto pb-10 flex flex-col items-center gap-6">
<div class="flex items-center gap-2">
<span class="text-body-md text-slate-500">아직 회원이 아니신가요?</span>
<a class="text-body-md font-bold text-[#209252] border-b border-[#209252]" href="#">회원가입</a>
</div>
<div class="text-center opacity-30">
<p class="text-[12px] font-black tracking-widest text-[#34383D]">EUREKA WORLD</p>
</div>
</section>
</main>
<!-- Bottom Spacing for Home Indicator -->
<div class="h-[34px] w-full"></div>
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Enable/disable login button based on input
        const idInput = document.querySelector('input[type="text"]');
        const pwInput = document.querySelector('input[type="password"]');
        const loginBtn = document.getElementById('login-submit');

        function validateInputs() {
            if (idInput.value.length > 0 && pwInput.value.length > 0) {
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-40');
            } else {
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-40');
            }
        }

        idInput.addEventListener('input', validateInputs);
        pwInput.addEventListener('input', validateInputs);
    </script>
</body></html>
