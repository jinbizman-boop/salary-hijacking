# services/scheduler/wrangler.toml
# 급여납치 Salary Hijacking Platform · Scheduler Cloudflare Workers 배포 설정 최종본
#
# 이 파일에는 secrets를 저장하지 않는다.
# 환경별로 아래 secrets를 등록한다.
#   wrangler secret put SCHEDULER_SERVICE_TOKEN_SHA256
#   wrangler secret put API_INTERNAL_SERVICE_TOKEN
#   wrangler secret put SCHEDULER_OPERATION_WEBHOOK_TOKEN
#
# Cron은 Cloudflare 기준 UTC로 실행된다. 기본값 23:00 UTC = 08:00 Asia/Seoul.

name = "salary-hijacking-scheduler"
main = "src/index.ts"
compatibility_date = "2026-06-15"
workers_dev = true
minify = true
upload_source_maps = true
keep_vars = true

[observability]
enabled = true

[placement]
mode = "smart"

[vars]
APP_ENV = "development"
ENVIRONMENT = "development"
NODE_ENV = "development"
SERVICE_NAME = "salary-hijacking-scheduler"
TIMEZONE = "Asia/Seoul"
API_INTERNAL_BASE_URL = "http://localhost:8787"
SCHEDULER_DISABLE_NETWORK = "true"
SCHEDULER_ENABLE_HTTP_RUN = "true"
SCHEDULER_ENABLE_SCHEDULED = "true"
SCHEDULER_AUDIT_TO_CONSOLE = "true"
SCHEDULER_REQUIRE_SERVICE_TOKEN = "false"
SCHEDULER_PAYDAY_REMINDER_ENABLED = "true"
SCHEDULER_FIXED_EXPENSE_REMINDER_ENABLED = "true"
SCHEDULER_MONTHLY_HIJACK_CLOSE_ENABLED = "true"
SCHEDULER_DATA_RETENTION_CLEANUP_ENABLED = "true"
PAYDAY_REMINDER_DRY_RUN = "true"
PAYDAY_REMINDER_BATCH_SIZE = "500"
PAYDAY_REMINDER_LOOKAHEAD_DAYS = "7"
PAYDAY_REMINDER_GRACE_DAYS = "2"
PAYDAY_REMINDER_LOCK_TTL_SECONDS = "1800"
PAYDAY_REMINDER_DEFAULT_HOUR = "8"
PAYDAY_REMINDER_AUDIT_TO_CONSOLE = "true"
PAYDAY_REMINDER_NOTIFICATION_ENABLED = "true"
PAYDAY_REMINDER_GROWTH_EVENT_ENABLED = "true"
FIXED_EXPENSE_REMINDER_DRY_RUN = "true"
FIXED_EXPENSE_REMINDER_BATCH_SIZE = "500"
FIXED_EXPENSE_REMINDER_LOOKAHEAD_DAYS = "7"
FIXED_EXPENSE_REMINDER_GRACE_DAYS = "3"
FIXED_EXPENSE_REMINDER_LOCK_TTL_SECONDS = "1800"
FIXED_EXPENSE_REMINDER_DEFAULT_HOUR = "9"
FIXED_EXPENSE_REMINDER_AUDIT_TO_CONSOLE = "true"
MONTHLY_HIJACK_CLOSE_DRY_RUN = "true"
MONTHLY_HIJACK_CLOSE_BATCH_SIZE = "300"
MONTHLY_HIJACK_CLOSE_GRACE_DAYS = "3"
MONTHLY_HIJACK_CLOSE_LOCK_TTL_SECONDS = "3600"
MONTHLY_HIJACK_CLOSE_HOUR = "6"
MONTHLY_HIJACK_CLOSE_AUDIT_TO_CONSOLE = "true"
MONTHLY_HIJACK_CLOSE_ALLOW_RECLOSE = "false"
MONTHLY_HIJACK_CLOSE_NOTIFICATION_ENABLED = "true"
MONTHLY_HIJACK_CLOSE_GROWTH_EVENT_ENABLED = "true"
DATA_RETENTION_DRY_RUN = "true"
DATA_RETENTION_BATCH_SIZE = "500"
DATA_RETENTION_LOCK_TTL_SECONDS = "1800"
DATA_RETENTION_AUDIT_TO_CONSOLE = "true"
DATA_RETENTION_AUTH_SESSION_DAYS = "30"
DATA_RETENTION_TEMP_TOKEN_DAYS = "7"
DATA_RETENTION_WITHDRAWN_USER_DAYS = "30"
DATA_RETENTION_PRIVACY_EXPORT_DAYS = "7"
DATA_RETENTION_NOTIFICATION_DAYS = "180"
DATA_RETENTION_PUSH_TOKEN_DAYS = "180"
DATA_RETENTION_UPLOAD_DAYS = "30"
DATA_RETENTION_COMMUNITY_DELETED_DAYS = "90"
DATA_RETENTION_AD_EVENT_DAYS = "90"
DATA_RETENTION_OPERATION_EVENT_DAYS = "180"
DATA_RETENTION_AUDIT_LOG_DAYS = "730"
DATA_RETENTION_ADMIN_AUDIT_LOG_DAYS = "1825"
DATA_RETENTION_RATE_LIMIT_DAYS = "30"
DATA_RETENTION_IDEMPOTENCY_DAYS = "14"
RAW_FINANCIAL_DATA_LOGGED = "false"
RAW_PUSH_TOKEN_LOGGED = "false"
RAW_AMOUNT_IN_NOTIFICATION_PAYLOAD = "false"
ADS_FINANCIAL_TARGETING_FORBIDDEN = "true"
SERVER_AUTHORITY_SCHEDULER = "true"
TOKEN_HASH_ONLY = "true"

[triggers]
crons = [
  "0 23 * * *"
]

[[queues.producers]]
binding = "SCHEDULER_OPERATION_QUEUE"
queue = "salary-hijacking-dev-scheduler-operations"

[[queues.producers]]
binding = "NOTIFICATIONS_RETRY_QUEUE"
queue = "salary-hijacking-dev-notifications-retry"

[[queues.producers]]
binding = "GROWTH_EVENTS_QUEUE"
queue = "salary-hijacking-dev-growth-events"

[[queues.consumers]]
queue = "salary-hijacking-dev-scheduler-operations"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "salary-hijacking-dev-scheduler-dlq"

