PUSH_TOKEN_HARD_DELETE_AFTER_DAYS = "180"
PUSH_TOKEN_CLEANUP_BATCH_SIZE = "500"
PUSH_TOKEN_CLEANUP_DRY_RUN = "false"
PUSH_TOKEN_CLEANUP_AUDIT_TO_CONSOLE = "true"
RAW_PUSH_TOKEN_LOGGED = "false"
RAW_FINANCIAL_DATA_LOGGED = "false"
RAW_FINANCIAL_DATA_FOR_ADS = "false"
ADS_FINANCIAL_TARGETING_FORBIDDEN = "true"
MARKETING_CONSENT_GUARD = "true"
TOKEN_HASH_ONLY = "true"
SERVER_AUTHORITY_NOTIFICATION_DISPATCH = "true"

[env.staging.triggers]
