  "*/10 * * * *",
  "0 18 * * *"
]

[[env.staging.queues.producers]]
binding = "NOTIFICATIONS_RETRY_QUEUE"
queue = "salary-hijacking-staging-notifications-retry"

[[env.staging.queues.producers]]
binding = "NOTIFICATIONS_OPERATION_QUEUE"
queue = "salary-hijacking-staging-notifications-operations"

[[env.staging.queues.consumers]]
queue = "salary-hijacking-staging-notifications-retry"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 5
dead_letter_queue = "salary-hijacking-staging-notifications-dlq"

[[env.staging.queues.consumers]]
queue = "salary-hijacking-staging-notifications-operations"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "salary-hijacking-staging-notifications-dlq"

