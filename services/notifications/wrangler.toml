FCM_PROJECT_ID = "salary-hijacking-staging"
FCM_DRY_RUN = "false"
FCM_DISABLE_NETWORK = "false"
ENABLE_NOTIFICATION_QUEUE_HANDLER = "true"
NOTIFICATIONS_AUDIT_TO_CONSOLE = "true"
NOTIFICATIONS_DISABLE_HTTP_SEND = "false"
NOTIFICATION_RETRY_MAX_ATTEMPTS = "5"
NOTIFICATION_RETRY_BASE_DELAY_SECONDS = "30"
NOTIFICATION_RETRY_MAX_DELAY_SECONDS = "21600"
NOTIFICATION_RETRY_JITTER_RATIO = "0.2"
NOTIFICATION_RETRY_BATCH_SIZE = "200"
NOTIFICATION_RETRY_DRY_RUN = "false"
NOTIFICATION_RETRY_AUDIT_TO_CONSOLE = "true"
PUSH_TOKEN_STALE_AFTER_DAYS = "90"
PUSH_TOKEN_EXPIRED_AFTER_DAYS = "365"
